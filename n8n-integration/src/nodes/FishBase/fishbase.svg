<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="fishGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fish body -->
  <ellipse cx="45" cy="50" rx="25" ry="12" fill="url(#fishGradient)" stroke="#2C5282" stroke-width="1"/>
  
  <!-- Fish tail -->
  <path d="M70 50 L85 45 L85 55 Z" fill="url(#fishGradient)" stroke="#2C5282" stroke-width="1"/>
  
  <!-- Fish eye -->
  <circle cx="35" cy="45" r="3" fill="white" stroke="#2C5282" stroke-width="1"/>
  <circle cx="36" cy="44" r="1.5" fill="#2C5282"/>
  
  <!-- Dorsal fin -->
  <path d="M35 38 Q45 30 55 38" fill="none" stroke="#2C5282" stroke-width="2"/>
  
  <!-- Ventral fin -->
  <path d="M35 62 Q45 70 55 62" fill="none" stroke="#2C5282" stroke-width="2"/>
  
  <!-- Text -->
  <text x="50" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C5282">FishBase</text>
</svg>